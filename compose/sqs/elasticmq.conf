# =============================================================================
# ElasticMQ 設定 (Amazon SQS のローカル代替)
# ---------------------------------------------------------------------------
# ElasticMQ は SQS 互換の HTTP API を提供する軽量なキューサーバ。
# AWS SDK / awscli の endpoint-url をこのコンテナ (http://sqs:9324) に向けるだけで
# 実際の SQS とほぼ同じ操作 (SendMessage / ReceiveMessage / DeleteMessage など) が
# できる。実 AWS には一切接続しない。
#
# HOCON 形式 (Typesafe Config)。編集後は `docker compose restart sqs` で反映。
# =============================================================================

include classpath("application.conf")

# ---------------------------------------------------------------------------
# node-address: ElasticMQ が返すキュー URL (QueueUrl) のホスト/ポート。
# ここを compose のサービス名 "sqs" にしておくことが最重要。
#   例) http://sqs:9324/000000000000/app-async-queue
# GetQueueUrl が返す URL をそのまま ReceiveMessage / DeleteMessage に使うため、
# compose ネットワーク内の他コンテナ (lambda-esm など) から名前解決できる
# ホスト名 (= サービス名 sqs) にしておく必要がある。
# localhost のままだと lambda-esm コンテナが自分自身を指してしまい疎通しない。
# ---------------------------------------------------------------------------
node-address {
    protocol = http
    host = sqs
    port = 9324
    context-path = ""
}

# 上の node-address を必ず使う (自動生成された IP アドレスを使わせない)
generate-node-address = false

# SQS 互換 REST API を 0.0.0.0:9324 で待ち受ける
rest-sqs {
    enabled = true
    bind-port = 9324
    bind-hostname = "0.0.0.0"
    # sqs-limits = strict にすると実 SQS と同じ入力バリデーション (メッセージ最大 256KB 等)
    sqs-limits = strict
}

# 統計情報/ヘルス確認用の簡易 HTTP (http://sqs:9325/statistics)
rest-stats {
    enabled = true
    bind-port = 9325
    bind-hostname = "0.0.0.0"
}

# ---------------------------------------------------------------------------
# キュー定義 (コンテナ起動時に自動作成される)
#   app-async-queue : アプリ (app-front / app-back) が非同期処理を積む本キュー
#   app-async-dlq   : 処理に3回失敗したメッセージが退避するデッドレターキュー
# ---------------------------------------------------------------------------
queues {

    # --- デッドレターキュー (先に定義しておく) ---
    app-async-dlq {
        defaultVisibilityTimeout = 30 seconds
        delay = 0 seconds
        receiveMessageWait = 0 seconds
        fifo = false
        contentBasedDeduplication = false
    }

    # --- 本キュー ---
    app-async-queue {
        # メッセージ取得後、他コンシューマから見えなくなる時間。
        # この間に Lambda 処理 → 削除まで完了させる。超えると再度可視化され再処理される。
        defaultVisibilityTimeout = 30 seconds

        # SendMessage 時点からメッセージが取得可能になるまでの遅延
        delay = 0 seconds

        # ReceiveMessage のサーバ側ロングポーリング既定秒数
        # (lambda-esm 側でも WaitTimeSeconds を明示指定している)
        receiveMessageWait = 0 seconds

        fifo = false
        contentBasedDeduplication = false

        # リドライブ設定: maxReceiveCount 回 (=3) 受信しても削除されなかった
        # メッセージを app-async-dlq へ移動する (実 SQS の RedrivePolicy 相当)
        deadLettersQueue {
            name = "app-async-dlq"
            maxReceiveCount = 3
        }
    }
}
