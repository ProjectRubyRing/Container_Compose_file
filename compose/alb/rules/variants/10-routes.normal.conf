# -----------------------------------------------------------------------------
# 切り替えソース: 通常モード (./alb-maintenance.sh off が 10-routes.conf へコピー)
# すべてのアプリ経路を app-back (ターゲットグループ) へ流す。
# ※ このファイルは variants/ 配下にあるため nginx の include (*.conf) では
#    読み込まれない (差し替え用のソース置き場)。
# -----------------------------------------------------------------------------
location /async/ {
    proxy_pass http://app_back;
}

location / {
    proxy_pass http://app_back;
}
