# -----------------------------------------------------------------------------
# 切り替えソース: 全面メンテナンスモード (./alb-maintenance.sh on が 10-routes.conf へコピー)
# すべてのアプリ経路をメンテナンス Lambda (maint_adapter 経由) へ流す。
# app-back へは一切転送せず、全リクエストにメンテナンス画面 + 503 を返す。
# ※ このファイルは variants/ 配下にあるため nginx の include (*.conf) では
#    読み込まれない (差し替え用のソース置き場)。
# -----------------------------------------------------------------------------
location / {
    proxy_pass http://maint_adapter;
}
