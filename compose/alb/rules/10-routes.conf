# -----------------------------------------------------------------------------
# リスナールール (★差し替え可能な切り替えファイル★) — 現在: 通常モード
# -----------------------------------------------------------------------------
# このファイルの内容が「アプリ経路をどこへ流すか」を決める。
# 全面メンテナンス ON/OFF は ./alb-maintenance.sh on|off で、
# compose/alb/rules/variants/ 配下の
#   10-routes.normal.conf  (通常)      /  10-routes.maintenance.conf  (全面メンテ)
# をこのファイルへコピーして nginx -s reload することで切り替える。
# 手動で内容を書き換えて `docker compose exec alb nginx -s reload` でも良い。
#
# ↓ 通常モード: すべて app-back (ターゲットグループ) へ
# -----------------------------------------------------------------------------
location /async/ {
    proxy_pass http://app_back;
}

location / {
    proxy_pass http://app_back;
}
