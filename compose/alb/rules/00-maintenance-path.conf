# -----------------------------------------------------------------------------
# リスナールール (常時有効): /maintenance* → メンテナンス Lambda
# -----------------------------------------------------------------------------
# 実 ALB の「パス /maintenance* のとき Lambda ターゲットへ転送」に相当。
# 全面メンテナンス (10-routes.conf) の ON/OFF とは独立に、いつでも
#   curl http://localhost:9080/maintenance
# でメンテナンス画面をプレビューできる。
#
# maint_adapter (alb-lambda-adapter) が HTTP↔Lambda イベント変換を行い、
# maintenance-lambda (maintenance.py) が画面 HTML とステータスコードを返す。
# -----------------------------------------------------------------------------
location /maintenance {
    proxy_pass http://maint_adapter;
}
