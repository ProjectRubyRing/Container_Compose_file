# =============================================================================
# nginx 設定 — Application Load Balancer (ALB) のローカル代替
# ---------------------------------------------------------------------------
# 実 AWS では:
#   Lambda → ALB (リスナー :80) → リスナールール (パス条件) → ターゲットグループ
#          → app-back (ECS, 8180)  または  Lambda ターゲット (メンテナンス画面)
# の経路をたどる。nginx でこの L7 ルーティングを模擬する。
#
#   upstream app_back              = ターゲットグループ (app-back:8180)
#   upstream maint_adapter         = Lambda ターゲット (メンテナンス Lambda を
#                                    alb-lambda-adapter 経由で呼ぶ)
#   listen 80                      = ALB リスナー (HTTP :80)
#   include /etc/nginx/rules/*.conf = リスナールール群 (★差し替え可能★)
#   proxy_set_header X-Forwarded-* = ALB が付与するヘッダの再現 (server 継承)
#
# ★リスナールールの切り替え:
#   ルールは compose/alb/rules/*.conf に分離してある (このファイルは触らない)。
#   全面メンテナンス ON/OFF は ./alb-maintenance.sh on|off で
#   rules/10-routes.conf を差し替えて nginx -s reload する。
#   詳細は docs/ASYNC-SQS-LAMBDA-ALB.md の「メンテナンス」節を参照。
# =============================================================================

worker_processes 1;
events { worker_connections 256; }

http {
    log_format alb '$remote_addr -> $upstream_addr "$request" '
                   'status=$status upstream_status=$upstream_status '
                   'rt=$request_time urt=$upstream_response_time';
    access_log /dev/stdout alb;
    error_log  /dev/stderr warn;

    # --- ターゲットグループ (app-back) ---------------------------------------
    # ECS の app-back は port-offset=100 のため HTTP は 8180。
    upstream app_back {
        server app-back:8180 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    # --- Lambda ターゲット (メンテナンス Lambda) -----------------------------
    # 実 ALB の「Lambda ターゲット統合」を alb-lambda-adapter が肩代わりする。
    upstream maint_adapter {
        server alb-lambda-adapter:8080 max_fails=3 fail_timeout=10s;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # ALB のアイドルタイムアウト相当
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # ALB が付与する標準ヘッダの再現 (各 location に継承される)
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  "80";

        # --- ALB 自体のヘルスチェック用 (nginx が生きているか) ---------------
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "alb-ok\n";
        }

        # --- リスナールール群 (★差し替え可能★) ------------------------------
        # 常時有効: 00-maintenance-path.conf (/maintenance* → メンテナンス Lambda)
        # 切り替え : 10-routes.conf (通常 = app-back / 全面メンテ = メンテナンス Lambda)
        include /etc/nginx/rules/*.conf;
    }
}
