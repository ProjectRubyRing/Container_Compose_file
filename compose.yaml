# =============================================================================
# ローカル検証用 Compose 構成 (AWS 実サービスには一切接続しない)
#
# ECS 構成との対応:
#   app-front / app-back      → 同一 Dockerfile・同一 entrypoint (完全に同じイメージ)
#   adot-collector            → 同じ ADOT Collector イメージ。exporter だけ
#                               awsxray → debug + otlphttp(Jaeger) に差し替え
#   jaeger                    → X-Ray コンソールの代替 (トレース可視化 UI)
#   mysql (8.4.7)             → Aurora MySQL 8.4 (Serverless v2) + RDS Proxy の代替
#                               (Aurora MySQL 8.4 互換のコミュニティ版 8.4.7 を使用)
#   valkey                    → ElastiCache for Valkey の代替
#   svf-mock (WireMock)       → ALB 越しの SVF 帳票サーバの代替
#   ecs-metadata-mock         → ECS Task Metadata Endpoint v4
#                               (ECS_CONTAINER_METADATA_URI_V4) のダミー応答
#   efs-mock                  → EFS の代替 (アクセスポイント不使用・マウントポイントのみ
#                               利用する想定)。named volume を UID 6301 / GID 6302 で
#                               初期化し、front/back へ /mnt/logs, /mnt/data として共有
#   cwagent                   → ECS と同じ CloudWatch Agent イメージのサイドカー。
#                               偽装 EFS 上のログファイルを検知して tail し、
#                               logs.endpoint_override で cloudwatch-logs-mock へ送信
#                               (実 CloudWatch Logs には送信しない)
#   cloudwatch-logs-mock      → CloudWatch Logs API のスタブ (WireMock)。cwagent からの
#                               PutLogEvents を受信し、request journal で送信内容を確認
#
# ECS では同一タスク内 localhost 通信だが、compose では各サービスが別ネットワーク
# 名前空間のため、宛先を環境変数 (OTEL_EXPORTER_OTLP_ENDPOINT / BACK_BASE_URL 等)
# で切り替えて等価性を担保する。
#
# 注意: この compose はテスト環境専用のため、DB パスワード等の秘匿情報は .env に
# 逃がさず本ファイルへ直書きしている (本番の値を書かないこと)。
# =============================================================================
name: eap-adot-local

services:
  app-front:
    build:
      context: ./docker
      dockerfile: front/Dockerfile
      args:
        EAP_BASE_IMAGE: ${EAP_BASE_IMAGE:?set in .env}
    container_name: app-front
    ports:
      - "8080:8080"
    environment:
      OTEL_SERVICE_NAME: myapp-front
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=myapp,service.version=local,deployment.environment=local,aws.ecs.service.name=local-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://adot-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_SAMPLER: parentbased_always_on   # ローカルは全量サンプリング
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: "ChangeMe_appdb_P@ss123"   # テスト環境用ダミー値 (直書き)
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      BACK_BASE_URL: http://app-back:8180
      # 非同期処理用 SQS (ElasticMQ) のローカルエンドポイント。
      # 実 AWS では SDK が IAM ロールとリージョンから解決するが、ローカルでは明示する。
      ASYNC_SQS_ENDPOINT: http://sqs:9324
      ASYNC_QUEUE_NAME: app-async-queue
      AWS_REGION: ap-northeast-1
      TX_NODE_ID: front-local-1
      # ECS ではタスク起動時にエージェントが注入する。ローカルではモックを指す
      ECS_CONTAINER_METADATA_URI_V4: http://ecs-metadata-mock:8080/v4/158d1c8083dd49d6b527399fd6414f5c-1234567890
    # 偽装 EFS (named volume)。実 ECS では EFS ボリューム (アクセスポイント不使用) を
    # 同じパスにマウントする。コンテナは jboss (UID 185) で動くため、GID 6302 を
    # 補助グループに追加してマウントポイント (6301:6302, mode 2775) へ書き込む
    volumes:
      - efs-logs:/mnt/logs
      - efs-data:/mnt/data
    group_add:
      - "6302"
    depends_on:
      adot-collector:
        condition: service_healthy
      mysql:
        condition: service_healthy
      valkey:
        condition: service_started
      app-back:
        condition: service_started
      ecs-metadata-mock:
        condition: service_started
      efs-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8080/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  app-back:
    build:
      context: ./docker
      dockerfile: back/Dockerfile
      args:
        EAP_BASE_IMAGE: ${EAP_BASE_IMAGE:?set in .env}
    container_name: app-back
    ports:
      - "8180:8180"
    environment:
      OTEL_SERVICE_NAME: myapp-back
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=myapp,service.version=local,deployment.environment=local,aws.ecs.service.name=local-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://adot-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_SAMPLER: parentbased_always_on
      PORT_OFFSET: "100"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: "ChangeMe_appdb_P@ss123"   # テスト環境用ダミー値 (直書き)
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      SVF_BASE_URL: http://svf-mock:8080
      # 非同期処理用 SQS (ElasticMQ) のローカルエンドポイント (front と同じキュー)
      ASYNC_SQS_ENDPOINT: http://sqs:9324
      ASYNC_QUEUE_NAME: app-async-queue
      AWS_REGION: ap-northeast-1
      TX_NODE_ID: back-local-1
      # ECS ではタスク起動時にエージェントが注入する。ローカルではモックを指す
      ECS_CONTAINER_METADATA_URI_V4: http://ecs-metadata-mock:8080/v4/158d1c8083dd49d6b527399fd6414f5c-2345678901
    # 偽装 EFS (named volume)。front と同じ 2 マウントポイントを共有する
    volumes:
      - efs-logs:/mnt/logs
      - efs-data:/mnt/data
    group_add:
      - "6302"
    depends_on:
      adot-collector:
        condition: service_healthy
      mysql:
        condition: service_healthy
      valkey:
        condition: service_started
      svf-mock:
        condition: service_started
      ecs-metadata-mock:
        condition: service_started
      efs-mock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8180/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ECS と同じ ADOT Collector イメージ。設定ファイルだけローカル用に差し替え
  adot-collector:
    image: public.ecr.aws/aws-observability/aws-otel-collector:v0.43.3
    container_name: adot-collector
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      # resourcedetection/ecs 検出器が参照する (ECS ではエージェントが注入する変数)
      ECS_CONTAINER_METADATA_URI_V4: http://ecs-metadata-mock:8080/v4/158d1c8083dd49d6b527399fd6414f5c-3456789012
    volumes:
      - ./compose/otel/adot-collector-local.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4318:4318"    # OTLP http/protobuf (ホストからの疎通確認用)
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      jaeger:
        condition: service_started
      ecs-metadata-mock:
        condition: service_started

  # X-Ray コンソールのローカル代替 (OTLP 受信 + トレース可視化 UI)
  jaeger:
    image: jaegertracing/jaeger:2.4.0
    container_name: jaeger
    ports:
      - "16686:16686"  # UI: http://localhost:16686

  # Aurora MySQL 8.4 (Serverless v2) のローカル代替
  # Aurora MySQL 3.10.x は MySQL 8.4 互換のため、コミュニティ版 8.4.7 を使用する。
  # 初期セットアップ (appdb/appuser・infdb/infuser の 2 スキーマ、XA_RECOVER_ADMIN 付与など)
  # は 8.0.42 のときと同一。8.4 系での取り扱い差分は docs/MYSQL-8.4-AURORA-UPGRADE.md を参照。
  mysql:
    image: mysql:8.4.7
    container_name: mysql
    environment:
      # テスト環境専用のためパスワードは直書き (本番の値を書かないこと)
      MYSQL_ROOT_PASSWORD: "localdev-root-change-me"
      # appdb / appuser は公式イメージのエントリポイントが作成
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: "ChangeMe_appdb_P@ss123"
      # infdb / infuser は 20-init-infdb.sh が作成 (パスワードはこの変数で注入)
      INFDB_PASSWORD: "ChangeMe_infdb_P@ss123"
    volumes:
      - ./compose/mysql/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./compose/mysql/init-infdb.sh:/docker-entrypoint-initdb.d/20-init-infdb.sh:ro
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ElastiCache for Valkey のローカル代替
  valkey:
    image: valkey/valkey:8.0
    container_name: valkey
    ports:
      - "6379:6379"

  # SVF 帳票サーバ (ALB 経由 REST) のローカル代替スタブ
  svf-mock:
    image: wiremock/wiremock:3.13.0
    container_name: svf-mock
    volumes:
      - ./compose/svf-mock/mappings:/home/wiremock/mappings:ro
    ports:
      - "8280:8080"

  # ECS Task Metadata Endpoint v4 (ECS_CONTAINER_METADATA_URI_V4) のローカル代替スタブ
  # GET /v4/<container-id>       → コンテナメタデータ (Fargate 実応答相当)
  # GET /v4/<container-id>/task  → タスクメタデータ (Fargate 実応答相当)
  # GET /v4/<container-id>/stats, /v4/<container-id>/task/stats → 空 JSON (簡略化)
  ecs-metadata-mock:
    image: wiremock/wiremock:3.13.0
    container_name: ecs-metadata-mock
    volumes:
      - ./compose/ecs-metadata-mock/mappings:/home/wiremock/mappings:ro
    ports:
      - "8380:8080"  # 例: curl http://localhost:8380/v4/158d1c8083dd49d6b527399fd6414f5c-1234567890/task

  # ---------------------------------------------------------------------------
  # EFS のローカル代替 (アクセスポイントは使わず、マウントポイントのみ利用する想定)
  # - アクセスポイント不使用の EFS では POSIX 権限がそのまま適用されるため、
  #   実環境でファイルシステム作成後に一度だけ root で行う初期 chown/chmod に相当する
  #   処理を、このコンテナが named volume に対して冪等に実行する
  # - /mnt/logs, /mnt/data の 2 マウントポイントを UID 6301 / GID 6302, mode 2775
  #   (setgid: 配下に作られるファイルへ GID 6302 を継承) で初期化する
  # - named volume を使うためホスト側ディレクトリの権限設定は一切変更不要
  #   (compose 環境内だけで完結する)
  efs-mock:
    image: alpine:3.21
    container_name: efs-mock
    command:
      - sh
      - -euc
      - |
        chown 6301:6302 /mnt/efs/logs /mnt/efs/data
        chmod 2775 /mnt/efs/logs /mnt/efs/data
        echo "[efs-mock] initialized /mnt/efs/logs /mnt/efs/data (owner=6301:6302 mode=2775)"
        touch /tmp/efs-initialized
        exec tail -f /dev/null
    volumes:
      - efs-logs:/mnt/efs/logs
      - efs-data:/mnt/efs/data
    healthcheck:
      # 初期化完了と所有者 6301:6302 を確認できたら healthy (front/back はこれを待つ)
      test: ["CMD-SHELL", "test -f /tmp/efs-initialized && [ \"$$(stat -c %u:%g /mnt/efs/logs)\" = \"6301:6302\" ] && [ \"$$(stat -c %u:%g /mnt/efs/data)\" = \"6301:6302\" ]"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  # ECS taskdef と同じ CloudWatch Agent イメージのサイドカー (ローカル用途はログ転送の偽装)
  # 偽装 EFS (/mnt/logs) に出力されたファイルを検知して tail し、
  # logs.endpoint_override により実 CloudWatch Logs の代わりに cloudwatch-logs-mock へ
  # PutLogEvents を送信する。認証情報は SigV4 署名を通すためだけのダミー値
  # (logs 出力は環境変数ではなく共有クレデンシャルファイルを参照するためファイルで注入)
  cwagent:
    image: public.ecr.aws/cloudwatch-agent/cloudwatch-agent:latest
    container_name: cwagent
    environment:
      AWS_REGION: ap-northeast-1
    volumes:
      # ECS では SSM Parameter Store (CW_CONFIG_CONTENT) で注入する設定を、
      # ローカルでは /etc/cwagentconfig へのファイルマウントで注入する
      - ./compose/cwagent/cwagent-config.json:/etc/cwagentconfig/cwagent-config.json:ro
      - ./compose/cwagent/aws-credentials:/root/.aws/credentials:ro
      - efs-logs:/mnt/logs:ro   # 読み取り専用で十分 (tail するだけ)
    depends_on:
      efs-mock:
        condition: service_healthy
      cloudwatch-logs-mock:
        condition: service_started

  # CloudWatch Logs API のローカル代替スタブ (cwagent の「送信の偽装」先)
  # CreateLogGroup / CreateLogStream / PutLogEvents を 200 で受けるだけで実送信はしない。
  # 受信内容は WireMock の request journal で確認する:
  #   curl -s -X POST http://localhost:8480/__admin/requests/count \
  #        -H "Content-Type: application/json" \
  #        -d '{"method":"POST","headers":{"X-Amz-Target":{"equalTo":"Logs_20140328.PutLogEvents"}}}'
  cloudwatch-logs-mock:
    image: wiremock/wiremock:3.13.0
    container_name: cloudwatch-logs-mock
    volumes:
      - ./compose/cloudwatch-logs-mock/mappings:/home/wiremock/mappings:ro
    ports:
      - "8480:8080"

  # ===========================================================================
  # 非同期処理チェーン (SQS → Lambda → ALB → app-back)
  # ---------------------------------------------------------------------------
  #   app-front / app-back        → SQS(app-async-queue) にメッセージを積む (プロデューサ)
  #   sqs (ElasticMQ)             → Amazon SQS のローカル代替 (キュー本体)
  #   lambda-esm (poller.py)      → SQS イベントソースマッピングの代替。キューを
  #                                 ロングポーリングし Lambda を HTTP invoke する
  #   lambda (RIE + handler.py)   → AWS Lambda ランタイムのローカル代替。SQS イベントを
  #                                 受け、ALB 経由で app-back を POST 呼び出しする
  #   alb (nginx)                 → Application Load Balancer のローカル代替 (L7 ルーティング)
  #                                 /async/* を app-back:8180 のサーブレットへ転送する
  #   app-back の /async/receive  → Java サーブレット (async-receiver.war) が POST を受信
  #
  # 詳細な仕組み・設定方法は docs/ASYNC-SQS-LAMBDA-ALB.md を参照。
  # ===========================================================================

  # --- Amazon SQS のローカル代替 (ElasticMQ) ---------------------------------
  # 起動時に compose/sqs/elasticmq.conf の queues 定義から
  # app-async-queue と app-async-dlq を自動作成する。
  sqs:
    image: softwaremill/elasticmq-native:1.6.11
    container_name: sqs
    volumes:
      - ./compose/sqs/elasticmq.conf:/opt/elasticmq.conf:ro
    ports:
      - "9324:9324"   # SQS 互換 REST API (aws --endpoint-url http://localhost:9324 ...)
      - "9325:9325"   # 統計/管理 UI (http://localhost:9325)

  # --- AWS Lambda ランタイムのローカル代替 (公式ベースイメージ + RIE) --------
  # 公式 python イメージにはランタイムインターフェースエミュレータ (RIE) が同梱され、
  # ローカルで起動すると 8080 で invoke エンドポイントを待ち受ける:
  #   POST /2015-03-31/functions/function/invocations
  # ハンドラコードは /var/task にマウントし、command でハンドラ名を渡す。
  lambda:
    image: public.ecr.aws/lambda/python:3.12
    container_name: lambda
    command: ["handler.lambda_handler"]   # <ファイル名>.<関数名>
    environment:
      ALB_ENDPOINT: http://alb:80         # POST 先 = ALB(nginx)
      BACK_PATH: /async/receive           # ALB のリスナールール /async/* と一致
      HTTP_TIMEOUT_SECONDS: "10"
    volumes:
      - ./compose/lambda/app:/var/task:ro # ここに handler.py を配置
    ports:
      - "9000:8080"                       # ホストから直接 invoke 検証する場合に使用
    depends_on:
      alb:
        condition: service_started

  # --- SQS イベントソースマッピングのローカル代替 (poller) --------------------
  # 実 AWS の「SQS → Lambda 自動起動」を肩代わりする常駐プロセス。
  lambda-esm:
    build:
      context: ./compose/lambda-esm
      dockerfile: Dockerfile
    container_name: lambda-esm
    environment:
      SQS_ENDPOINT: http://sqs:9324
      QUEUE_NAME: app-async-queue
      LAMBDA_INVOKE_URL: http://lambda:8080/2015-03-31/functions/function/invocations
      AWS_REGION: ap-northeast-1
      # ElasticMQ は署名検証しないがダミー資格情報が必要 (boto3 が必ず署名するため)
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      BATCH_SIZE: "10"
      WAIT_TIME_SECONDS: "20"
    depends_on:
      sqs:
        condition: service_started
      lambda:
        condition: service_started

  # --- Application Load Balancer のローカル代替 (nginx) -----------------------
  # /async/*      → app-back:8180 のサーブレット (ターゲットグループ)
  # /maintenance* → メンテナンス Lambda (alb-lambda-adapter 経由の Lambda ターゲット)
  # リスナールールは compose/alb/rules/*.conf に分離 (★差し替え可能★)。
  # 全面メンテナンス ON/OFF は ./alb-maintenance.sh on|off で切り替える。
  alb:
    image: nginx:1.27-alpine
    container_name: alb
    volumes:
      - ./compose/alb/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./compose/alb/rules:/etc/nginx/rules:ro   # リスナールール群 (差し替え可能)
    ports:
      - "9080:80"   # ホストから ALB 経由の疎通確認用 (http://localhost:9080/async/receive)
    depends_on:
      app-back:
        condition: service_started
      alb-lambda-adapter:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --- メンテナンス画面用 Lambda のローカル代替 (RIE + maintenance.py) --------
  # ALB のリスナールールから呼ばれ、メンテナンス画面 (HTML) とステータスコード
  # (既定 503) を返す。maintenance.py はボリュームマウントのため差し替え可能。
  maintenance-lambda:
    image: public.ecr.aws/lambda/python:3.12
    container_name: maintenance-lambda
    command: ["maintenance.lambda_handler"]   # <ファイル名>.<関数名>
    environment:
      MAINTENANCE_STATUS_CODE: "503"           # メンテナンス用ステータスコード
      RETRY_AFTER_SECONDS: "300"
      MAINTENANCE_UNTIL: ""                     # 例: "2026-07-21 03:00 JST" (任意)
    volumes:
      - ./compose/maintenance-lambda/app:/var/task:ro   # ここに maintenance.py を配置
    ports:
      - "9001:8080"   # ホストから直接 invoke 検証する場合に使用

  # --- ALB の Lambda ターゲット統合 (HTTP↔Lambda イベント変換) のローカル代替 --
  # nginx(ALB) と maintenance-lambda(RIE) の間に入り、HTTP を ELB イベントへ変換して
  # invoke し、Lambda 応答 (statusCode/headers/body) を HTTP レスポンスへ戻す。
  alb-lambda-adapter:
    image: python:3.12-slim
    container_name: alb-lambda-adapter
    command: ["python", "/app/adapter.py"]
    environment:
      LAMBDA_INVOKE_URL: http://maintenance-lambda:8080/2015-03-31/functions/function/invocations
      LISTEN_PORT: "8080"
    volumes:
      - ./compose/alb-lambda-adapter/adapter.py:/app/adapter.py:ro
    ports:
      - "9081:8080"   # nginx を介さずアダプタ経由でメンテナンス画面を確認する場合に使用
    depends_on:
      maintenance-lambda:
        condition: service_started

volumes:
  mysql-data:
  # 偽装 EFS の実体。ホストのディレクトリを bind mount しないことで、
  # ホスト側のユーザ/権限設定に依存せず UID 6301 / GID 6302 を維持できる
  efs-logs:
  efs-data:
